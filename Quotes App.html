<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes App</title>

    <link rel="stylesheet" href="Quotes App.css">

</head>

<body>

<div class="container">

    <h1>✨ Quotes App</h1>


    <div class="quote-box">

        <p id="quote">
            Loading quote...
        </p>


        <h3 id="author">
            
        </h3>


        <div class="buttons">

            <button id="newQuote">
                New Quote
            </button>


            <button id="copyQuote">
                Copy
            </button>


            <button id="shareQuote">
                Share
            </button>

        </div>


    </div>


</div>


<script src="Quotes App.js"></script>

</body>
</html>
