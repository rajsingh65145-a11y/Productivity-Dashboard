<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Expance tracker.css">
</head>
<body>
<div class="container">

  <h1>Expense Tracker</h1>

  <!-- BALANCE -->
  <div class="balance-box">

    <h2>Total Balance</h2>

    <h3 id="balance">₹0</h3>

  </div>

  <!-- FORM -->
  <form id="transaction-form">

    <input
      type="text"
      id="text"
      placeholder="Enter title"
      required
    >

    <input
      type="number"
      id="amount"
      placeholder="Enter amount"
      required
    >

    <button type="submit">
      Add Transaction
    </button>

  </form>

  <!-- TRANSACTION LIST -->
  <div class="transactions">

    <h2>Transactions</h2>

    <ul id="transaction-list"></ul>

  </div>

</div>

</body>
<script src="Expance tracker.js"></script>
</html>
