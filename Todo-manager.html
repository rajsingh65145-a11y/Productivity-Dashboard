<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>productivity-dashboard</title>
    <link rel="stylesheet" href="Narayan.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <img src="logo.y.jpg" alt="Taskflow logo">
            <h2>TaskFlow</h2>
        </div>

        <nav>
            <ul>
                <li><a href="#" class="activa">home</a></li>
                <li><a href="#">Apps</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">contact</a></li>

            </ul>

        </nav>
        <div class="nav-icons">
            <i class="fa-regular fa-bell"></i>

            <i class="fa-regular fa-user"></i>
            <button class="them-btn">
                <i class="fa-solid fa-moon"></i>
            </button>


        </div>
    </header>
    <main class="main-container">
        <section class="page-title">
            <h1>to-do manager</h1>
            <p>plan your day get things done.</p>
        </section>
        <section class="top-controls">
            <div class="search-box">
                <i class="fa-soid fa-magnifying-glass"></i>
                <input type="text" placeholder="search task...">
            </div>
            <select>
                <option>all</option>
                <option>panding</option>
                <option>completed</option>

            </select>
            <button class="add-btn">
                <i class="fa-solid fa-plus"></i>
                addtask
            </button>
        </section>
        <section class="filter-tabs">
            <button class="active-tab">all (6)</button>
            <button>padding (3)</button>
            <button>comleted (3)</button>

        </section>
        <section class="task-list">
            <div class="task-card">
                <input type="checkbox">
                <div class="task-info">
                    <h3>Learn html & css</h3>
                    <span class="badge work">work</span>
                </div>
                <div class="task-date">
                    <span>may 20</span>
                    <i class="fa-regular fa-trash-can"></i>

                </div>
            </div>
            <div class="task-card">
                <input type="checkbox">
                <div class="task-info">
                    <h3>comlete project design</h3>
                    <span class="badge work">work</span>

                </div>
                <div class="task-date">
                    <span>may 21</span>
                    <i class="fa-regular fa-trash-can"></i>
                </div>
            </div>

            <div class="task-card">
                <input type="checkbox">
                <div class="task-into">
                    <h3>buy groceries</h3>

                    <span class="badge personal"></span>
                        
                </div>
                <div class="task-date">
                    <span>may 21</span>
                    <i class="fa-regular fa-trash-can"></i>

                </div>
            </div>
            <div class="task-card complete">
                <input type="checkbox" cheked>
                <div class="task-info">
                    <h3>morning worout</h3>

                    <span class="badge health">health</span>

                </div>
                <div class="task-date">
                    <span>may 19</span>
                    <i class="fa-regular fa-trash-can"></i>
                </div>
            </div>
            <!--task 5-->
            <div class="task-card completed">
                <input type="checkbox" checked>
                <div class="task-info">
                    <h3>read a book</h3>
                    <span class="badge personal">personal</span>

                </div>
                <div class="task-date">
                    <span>may 18</span>
                    <i class="fa-regular fa-trash-can"></i>

                </div>
             </div>
             <!--task 6-->
             <div class="task-card complete">
                <input type="checkbox" checked>
                <div class="task-info">
                    <h3>meditation</h3>
                    <span class="badge health">health</span>
                </div>

             </div>
        </section>
    </main>

</body>

</html>
